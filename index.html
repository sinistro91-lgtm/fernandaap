<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Designer de Interiores</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background:#f5f5f5;
    color:#333;
}

header{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    z-index:999;
}

header nav a{
    margin:0 15px;
    text-decoration:none;
    color:#333;
    font-weight:600;
}

section{
    min-height:100vh;
    padding:120px 40px 60px 40px;
    color:#fff
}

/* HOME FULLSCREEN */
.home{
    position:relative;
    background:url('img/sala.jpg') center/cover no-repeat fixed;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* Camadas de texturas */
.layer{
    position:absolute;
    width:100%;
    height:100%;
    background-size:cover;
    background-position:center;
    pointer-events:none;
    transition:0.5s;
}

/* Áreas clicáveis */
.hotspot{
    position:absolute;
    cursor:pointer;
    border:2px dashed rgba(255, 255, 255, 0.3);
}

.hotspot:hover{
    border:2px solid #fff;
}

/* posições (ajuste conforme sua imagem) */
.parede{ top:10%; left:5%; width:60%; height:50%; }
.sofa{ bottom:15%; left:20%; width:40%; height:30%; }
.tapete{ bottom:5%; left:25%; width:50%; height:15%; }
.vaso{ bottom:30%; right:10%; width:10%; height:20%; }
.janela{ top:10%; right:10%; width:20%; height:35%; }

/* OUTRAS SEÇÕES */
.sobre, .projetos, .materiais, .contato{
    background:#fff;
}

h1{
    font-size:42px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:#fafafa;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* CONTATO */
form{
    max-width:500px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:12px 25px;
    border:none;
    background:#333;
    color:#fff;
    border-radius:5px;
}

/* RESPONSIVO */
@media(max-width:768px){
    header{
        flex-direction:column;
    }
    header nav{
        margin-top:10px;
    }
}

</style>
</head>

<body>

<header>
    <div>
        
        <strong></strong></div>
    <nav>
        <a href="#home">Home</a>
        <a href="#sobre">Sobre</a>
        <a href="#projetos">Projetos</a>
        <a href="#materiais">Materiais</a>
        <a href="#contato">Contato</a>
    </nav>
</header>

<!-- HOME INTERATIVA -->
<section id="home" class="home">

    <div id="layerParede" class="layer"></div>
    <div id="layerSofa" class="layer"></div>
    <div id="layerTapete" class="layer"></div>

    <CENTER><p><h1 
    <div class="hotspot tapete" onclick="trocarTapete()"><br>HOME DECOR CLICK AQUI</cor></h1></div></CENTER>
   </p>

</section>

<!-- SOBRE -->
<section id="sobre" class="sobre">
    <h1>Sobre</h1>
    <p>Descrição do designer, conceito de trabalho, estilo e diferenciais.</p>
</section>

<!-- PROJETOS -->
<section id="projetos" class="projetos">
    <h1>Projetos</h1>
    <div class="grid">
        <div class="card">Projeto 1</div>
        <div class="card">Projeto 2</div>
        <div class="card">Projeto 3</div>
    </div>
</section>

<!-- MATERIAIS -->
<section id="materiais" class="materiais">
    <h1>Materiais</h1>
    <div class="grid">
        <div class="card">Madeiras</div>
        <div class="card">Tecidos</div>
        <div class="card">Revestimentos</div>
    </div>
</section>

<!-- CONTATO -->
<section id="contato" class="contato">
    <h1>Contato</h1>
    <form>
        <input type="text" placeholder="Nome">
        <input type="email" placeholder="Email">
        <textarea rows="5" placeholder="Mensagem"></textarea>
        <button>Enviar</button>
    </form>
</section>

<script>
let parede = 0;
let sofa = 0;
let tapete = 0;

function trocarParede(){
    parede++;
    const imgs = [
        "img/texturas/parede1.png",
        "img/texturas/parede2.png"
    ];
    document.getElementById("layerParede").style.backgroundImage =
        `url(${imgs[parede % imgs.length]})`;
}

function trocarSofa(){
    sofa++;
    const imgs = [
        "img/texturas/sofa1.png",
        "img/texturas/sofa2.png"
    ];
    document.getElementById("layerSofa").style.backgroundImage =
        `url(${imgs[sofa % imgs.length]})`;
}

function trocarTapete(){
    tapete++;
    const imgs = [
        "img/texturas/tapete1.png",
        "img/texturas/tapete2.png",
        "img/texturas/tapete3.png",
        "img/texturas/tapete4.png",
        "img/texturas/tapete5.png",
        "img/texturas/tapete6.png",
    ];
    document.getElementById("layerTapete").style.backgroundImage =
        `url(${imgs[tapete % imgs.length]})`;
}
</script>

</body>
</html>
